# Local Development Configuration
# NOTE: This file is ONLY for local development with `wrangler dev`
# Production deployment uses the CLI tool via Cloudflare Management API
# Do not use `wrangler deploy` - use `dotnet run --project cli/ -- deploy` instead

name = "clef-search-dev"
main = "dist/worker.js"
compatibility_date = "2024-11-01"

# Environment variables
[vars]
ALLOWED_ORIGIN = "http://localhost:1313"
INDEX_API_KEY = "dev-local-key"

# D1 database for search content + FTS5
[[d1_databases]]
binding = "DB"
database_name = "clef-search-dev"
database_id = "placeholder-replace-with-actual-id"

# AI binding for Workers AI embeddings
[ai]
binding = "AI"

# Vectorize index for vector similarity search
[[vectorize]]
binding = "VECTORIZE"
index_name = "clef-content-dev"
