baseURL: https://clef-lang.com/
languageCode: en-us
title: Clef Programming Language

module:
  hugoVersion:
    min: 0.128.0

  imports:
    # Hextra theme
    - path: github.com/imfing/hextra

    # Language specification from external repo
    - path: github.com/FidelityFramework/clef-lang-spec
      mounts:
        - source: spec
          target: content/spec/draft

  # Local project mounts (REQUIRED once any import has custom mounts)
  mounts:
    - source: content
      target: content
    - source: static
      target: static
    - source: assets
      target: assets
    - source: layouts
      target: layouts
    - source: data
      target: data
    - source: i18n
      target: i18n

enableRobotsTXT: true
enableGitInfo: true

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block:
            - - \[
              - \]
            - - $$
              - $$
          inline:
            - - \(
              - \)
        enable: true
  highlight:
    noClasses: false

menu:
  main:
    - identifier: docs
      name: Documentation
      pageRef: /docs
      weight: 1
    - identifier: spec
      name: Specification
      pageRef: /spec
      weight: 2
    - identifier: blog
      name: Blog
      pageRef: /blog
      weight: 3
    - identifier: search
      name: Search
      weight: 4
      params:
        type: search
    - identifier: github
      name: GitHub
      url: https://github.com/FidelityFramework
      weight: 5
      params:
        icon: github

params:
  description: "Clef is a concurrent systems language targeting CPU, GPU, NPU, FPGA, and other accelerators with proof-carrying capabilities for safe realtime systems."

  navbar:
    displayTitle: true
    displayLogo: true

  page:
    width: normal

  theme:
    default: system
    displayToggle: true

  editURL:
    enable: false

  search:
    enable: true

  searchWorkerUrl: "https://clef-search.engineering-0c5.workers.dev"

  footer:
    displayCopyright: true
    displayPoweredBy: false

  blog:
    list:
      displayTags: true
      pagerSize: 12
      sortBy: date
      sortOrder: desc

  highlight:
    copy:
      enable: true
      display: hover
